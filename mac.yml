- hosts: localhost

  vars:
    configure:
      maven: true

    work:
      midas: true

    terminal:
      app: ghostty
      font:
        size: 13

    shell:
      bin: /opt/homebrew/bin/fish
      args: -l
      path: /opt/homebrew/bin /opt/homebrew/sbin ~/.cargo/bin

    aliases:
      l1: eza -1
      ls: eza
      ll: eza -l --icons=auto --group-directories-first

      grep: ug
      egrep: ug -E
      fgrep: ug -F
      xzgrep: ug -z
      xzegrep: ug -zE
      xzfgrep: ug -zF

      cat: bat --style=plain --pager=never

      v: nvim

    abbrs:
      pengudroid: scrcpy -eS --always-on-top --power-off-on-close

    brew:
      repos:
        - esolitos/ipa # for sshpass
        - hashicorp/tap

      packages:
        - awscli
        - bash
        - bat
        - btop
        - cosign
        - direnv
        - dive
        - eza
        - fish
        - fzf
        - gh
        - gnu-tar
        - golang
        - hashicorp/tap/terraform
        - helm
        - httpie
        - ipcalc
        - jq
        - just
        - k9s
        - kind
        - krew
        - kubectl
        - kubectx
        - lazygit
        - neovim
        - openjdk@21
        - opentofu
        - ripgrep
        - rustup
        - sshpass
        - starship
        - telnet
        - the_silver_searcher
        - ugrep
        - uptimed
        - watch
        - wget
        - zellij
        - zoxide

      casks:
        - 1password-cli
        - beekeeper-studio
        - brave-browser
        - caffeine
        - font-jetbrains-mono
        - ghostty
        - libreoffice
        - obsidian
        - openvpn-connect
        - postman
        - rar
        - spotify
        - windows-app
        - zoom

  roles:
    - brew
    - configuration
    - mac
    - work
