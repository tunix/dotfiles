configure:
  maven: false

abbrs:
  rm: rm -i
  lc: wc -l
  port: lsof -i

terminal:
  app: ghostty
  multiplexer: zellij
  window:
    width: 160
    height: 42
    opacity: 0.7
    blur: true
    decorations: "TITLE | RESIZE"
  font:
    size: 11
    face: JetBrains Mono
  colors:
    ghostty:
      light: Catppuccin Latte
      dark: Catppuccin Frappe
    zellij:
      light: catppuccin-latte
      dark: catppuccin-frappe
    k9s:
      light: catppuccin-latte
      dark: catppuccin-frappe
    bat:
      light: Catppuccin Latte
      dark: Catppuccin Frappe

shell:
  bin: /usr/bin/fish
  args: -l
  path: ~/.cargo/bin ~/.krew/bin

editor:
  name: nvim
  colors:
    lazyvim:
      light: catppuccin-latte
      dark: catppuccin-frappe

onepassword:
  enabled: false

ghostty:
  config_path: .config/ghostty

opencode:
  mcp:
    github:
      enabled: true
      type: local
      command:
        - docker
        - run
        - -i
        - --rm
        - "-p"
        - 127.0.0.1:8085:8085
        - "-e"
        - GITHUB_OAUTH_CALLBACK_PORT=8085
        - ghcr.io/github/github-mcp-server

  tui:
    keybinds: {}
    attention:
      enabled: true
      notifications: true
      sound: true
      volume: 1
