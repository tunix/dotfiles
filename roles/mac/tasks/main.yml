- name: Set IPv4 TTL to 65
  become: true
  ansible.posix.sysctl:
    name: net.inet.ip.ttl
    value: "65"
    state: present
    sysctl_set: true
    reload: true

- name: Copy notify-color-preference-changes script
  copy:
    src: "{{ role_path }}/files/colors/notify-color-preference-changes.sh"
    dest: "{{ ansible_facts.user_dir }}/.local/bin/notify-color-preference-changes.sh"
    mode: 0755

- name: Install toggle-color-preferences plist
  template:
    src: colors/at.alperkan.toggle-color-preferences.plist.j2
    dest: "{{ ansible_facts.user_dir }}/Library/LaunchAgents/at.alperkan.toggle-color-preferences.plist"
    mode: "0755"
